version: '3.8'

services:
  ubuntu:
    build: .
    container_name: ubuntu-railway
    ports:
      - "80:80"           # HTTP
      - "443:443"         # HTTPS
      - "22:22"           # SSH
      - "3000:3000"       # App
      - "3001:3001"       # Dashboard
      - "7681:7681"       # Web Terminal (ttyd)
      - "9090:9090"       # Cockpit
    environment:
      - NODE_ENV=development
      - PYTHONUNBUFFERED=1
    volumes:
      - ./:/app
    stdin_open: true
    tty: true
    networks:
      - ubuntu-network

networks:
  ubuntu-network:
    driver: bridge
